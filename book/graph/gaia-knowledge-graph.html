 "sub": "prediction", "label": "Weather & AR forecasting", "d": "ACE2 + atmospheric-river index; AI weather for precipitation."}, {"id": "e2s", "cat": "model", "sub": "prediction", "label": "Earth2Studio (forecast driver)", "d": "AI weather models supplying forecast precipitation to land models."}, {"id": "quakexnet", "cat": "model", "sub": "detection", "label": "QuakeXNet + ENVELOC", "d": "DL seismic detector & locator for surface mass-movement events."}, {"id": "eqdetect", "cat": "model", "sub": "detection", "label": "Large-earthquake detection", "d": "DL detection of earthquakes & strong motion (SeisBench)."}, {"id": "stormdet", "cat": "model", "sub": "detection", "label": "Storm detector", "d": "Thunderstorm detection from seismic + weather data."}, {"id": "flashflood", "cat": "model", "sub": "detection", "label": "Flash-flood detection", "d": "Rapid detection from gauges, radar, and geophysical signals."}, {"id": "dem", "cat": "data", "sub": "raw", "label": "DEM (3DEP / OpenTopo)", "d": "Terrain elevation; sets slope & contributing area."}, {"id": "solus", "cat": "data", "sub": "raw", "label": "SOLUS100 soil", "d": "100 m soil texture/depth/density priors."}, {"id": "polaris", "cat": "data", "sub": "raw", "label": "POLARIS soil", "d": "30 m probabilistic soil priors."}, {"id": "nlcd", "cat": "data", "sub": "raw", "label": "NLCD land cover", "d": "Vegetation → plant functional type, root cohesion."}, {"id": "vs30", "cat": "data", "sub": "raw", "label": "Vs30 / site geology", "d": "Site amplification & liquefaction susceptibility priors."}, {"id": "geotech", "cat": "data", "sub": "raw", "label": "Geotech / Vs profiles", "d": "Parametric shear-velocity & geotechnical indices."}, {"id": "prism", "cat": "data", "sub": "observed", "label": "PRISM precip + temp", "d": "Observed daily forcing (hindcast / nowcast)."}, {"id": "smap", "cat": "data", "sub": "observed", "label": "SMAP soil moisture", "d": "9 km soil-moisture calibration target."}, {"id": "era5", "cat": "dat "Soil moisture (modeled)", "d": "Root-zone saturation state."}, {"id": "head", "cat": "data", "sub": "derived", "label": "Water table / head", "d": "Deep wetness closure; liquefaction antecedent state."}, {"id": "strength", "cat": "data", "sub": "derived", "label": "Effective stress / strength", "d": "Cohesion & friction governing failure."}, {"id": "dvv", "cat": "data", "sub": "derived", "label": "dv/v → Vs state", "d": "Time-lapse seismic velocity → saturation & water table."}, {"id": "pf", "cat": "data", "sub": "derived", "label": "Probability of failure  Pf", "d": "Primary landslide susceptibility product (0–1)."}, {"id": "lpi", "cat": "data", "sub": "derived", "label": "Liquefaction potential index", "d": "Ground-failure potential product."}, {"id": "shakemap", "cat": "data", "sub": "derived", "label": "Ground motion / ShakeMap", "d": "PGA/PGV field — earthquake product & liquefaction trigger."}, {"id": "detcat", "cat": "data", "sub": "derived", "label": "QuakeXNet detection catalog", "d": "Detected surface events — monitoring + validation labels."}, {"id": "floodmap", "cat": "data", "sub": "derived", "label": "Flood inundation forecast", "d": "Predicted flood extent & depth."}, {"id": "stormnow", "cat": "data", "sub": "derived", "label": "Storm / convection nowcast", "d": "Detected & short-lead convective activity."}];
const E=[["dem", "slope", "f"], ["dem", "routing", "f"], ["routing", "slope", "f"], ["routing", "recharge", "f"], ["solus", "transmiss", "f"], ["polaris", "transmiss", "f"], ["solus", "strength", "f"], ["polaris", "strength", "f"], ["solus", "ecohydro", "f"], ["nlcd", "ecohydro", "f"], ["prism", "ecohydro", "f"], ["prism", "snow", "f"], ["synoptic", "ecohydro", "f"], ["snow", "ecohydro", "f"], ["ecohydro", "sm", "p"], ["ecohydro", "recharge", "p"], ["transmiss", "wetness", "f"], ["recharge", "wetness", "f"], ["slope", "wetness", "f"], ["gw", "head", "p"], ["wetness", "landlab", "f"], ["strength", "landlab", "f"], ["head", "landlab", "f"], ["landlab", "pf", "p"], ["landslide", "landlab", "u"], ["landslide", "pf", "p"], ["landslide", "wetness", "u"], ["landslide", "gw", "u"], ["smap", "sm", "v"], ["era5", "snow", "v"], ["seismic", "quakexnet", "f"], ["quakexnet", "detcat", "p"], ["detcat", "landslide", "d"], ["detcat", "pf", "v"], ["sar", "pf", "v"], ["lidar", "pf", "v"], ["inventory", "pf", "v"], ["seismic", "dvv", "f"], ["dvv", "reanalysis", "f"], ["smap", "reanalysis", "f"], ["synoptic", "reanalysis", "f"], ["reanalysis", "head", "p"], ["reanalysis", "sm", "p"], ["reanalysis", "strength", "p"], ["seismic", "eqdetect", "f"], ["eqdetect", "earthquake", "d"], ["seismic", "wavefield", "f"], ["vs30", "wavefield", "f"], ["wavefield", "shakemap", "p"], ["earthquake", "wavefield", "u"], ["earthquake", "eqdetect", "u"], ["earthquake", "shakemap", "p"], ["shakemap", "liq", "f"], ["geotech", "liq", "f"], ["vs30", "liq", "f"], ["head", "liq", "f"], ["strength", "liq", "f"], ["reanalysis", "liq", "f"], ["liq", "lpi", "p"], ["earthquake", "liq", "u"], ["prism", "floodfcst", "f"], ["gauges", "floodfcst", "f"], ["snow", "floodfcst", "f"], ["sm", "floodfcst", "f"], ["era5", "floodfcst", "f"], ["floodfcst", "floodmap", "p"], ["flood", "floodfcst", "u"], ["flood", "floodmap", "p"], ["flood", "routing", "u"], ["flood", "recharge", "u"], ["gauges", "flashflood", "f"], ["radar", "flashflood", "f"], ["flashflood", "flood", "d"], ["seismic", "stormdet", "f"], ["synoptic", "stormdet", "f"], ["radar", "stormdet", "f"], ["lightning", "stormdet", "f"], ["stormdet", "stormnow", "p"], ["stormdet", "thunderstorm", "d"], ["ari", "weather", "f"], ["era5", "weather", "f"], ["synoptic", "weather", "f"], ["weather", "thunderstorm", "u"], ["thunderstorm", "stormdet", "u"], ["thunderstorm", "stormnow", "p"], ["e2s", "ecohydro", "f"], ["e2s", "landlab", "f"], ["e2s", "floodfcst", "f"], ["weather", "floodfcst", "f"], ["e2s", "weather", "f"]];

const SUB={}; CATS.forEach(c=>c.subs.forEach(([k,name,l])=>SUB[k]={cat:c.key,name,hue:c.hue,sat:c.sat,l}));
const colorOf=sub=>`hsl(${SUB[sub].hue},${SUB[sub].sat}%,${SUB[sub].l}%)`;
const byId=Object.fromEntries(N.map(n=>[n.id,n]));
const adj={}; N.forEach(n=>adj[n.id]=new Set());
E.forEach(([a,b])=>{adj[a].add(b);adj[b].add(a);});
const SIZE=n=>n.cat==="hazard"?13:n.cat==="model"?9:["pf","lpi","shakemap","floodmap","stormnow","detcat"].includes(n.id)?8:6.3;

const NS="http://www.w3.org/2000/svg";
const svg=document.getElementById("svg");
let W=svg.clientWidth,H=svg.clientHeight;
const root=document.createElementNS(NS,"g");svg.appendChild(root);
const gL=document.createElementNS(NS,"g");root.appendChild(gL);
const gN=document.createElementNS(NS,"g");root.appendChild(gN);

N.forEach((n,i)=>{const a=2*Math.PI*i/N.length;n.x=W/2+Math.cos(a)*Math.min(W,H)*0.36+(Math.random()-.5)*40;
  n.y=H/2+Math.sin(a)*Math.min(W,H)*0.32+(Math.random()-.5)*40;n.vx=0;n.vy=0;n.r=SIZE(n);n.fixed=false;n.hidden=false;n.color=colorOf(n.sub);});

const linkEls=E.map(([a,b,t])=>{const l=document.createElementNS(NS,"line");
  const col=(t==="v"||t==="d")?"#d96b9a":"#5b6b8c";l.setAttribute("stroke",col);l.setAttribute("stroke-opacity",".26");
  if(t==="v")l.setAttribute("stroke-dasharray","2 4");if(t==="d")l.setAttribute("stroke-dasharray","1 4");
  gL.appendChild(l);return{a,b,t,el:l};});
const nodeEls=N.map(n=>{const grp=document.createElementNS(NS,"g");grp.setAttribute("class","node");
  const c=document.createElementNS(NS,"circle");c.setAttribute("r",n.r);c.setAttribute("fill",n.color);
  c.setAttribute("stroke","#0e1320");c.setAttribute("stroke-width","1.5");c.style.cursor="pointer";
  const tx=document.createElementNS(NS,"text");tx.textContent=n.label;tx.setAttribute("x",n.r+4);tx.setAttribute("y",4);
  if(n.cat==="hazard")grp.classList.add("always");
  grp.appendChild(c);grp.appendChild(tx);gN.appendChild(grp);
  grp.addEventListener("pointerenter",()=>hover(n.id));grp.addEventListener("pointerleave",()=>hover(null));
  grp.addEventListener("pointerdown",ev=>{ev.stopPropagation();drag={n};n.fixed=true;svg.setPointerCapture(ev.pointerId);});
  grp.addEventListener("click",ev=>{ev.stopPropagation();detailFor(n.id);});
  return{n,grp,c,tx};});

// legend grouped by category, toggles per subcategory
const legend=document.getElementById("legend");const hidden={};
CATS.forEach(cat=>{const h=document.createElement("div");h.className="cat";h.textContent=cat.name+" — by subcategory";legend.appendChild(h);
  cat.subs.forEach(([k,name,l])=>{const row=document.createElement("div");row.className="leg";
    const dot=document.createElement("span");dot.className="dot";dot.style.background=colorOf(k);
    row.appendChild(dot);row.appendChild(document.createTextNode(name));
    row.onclick=()=>{hidden[k]=!hidden[k];row.classList.toggle("off",hidden[k]);vis();};legend.appendChild(row);});});

let alpha=1;
function tick(){
  for(let i=0;i<N.length;i++){const a=N[i];if(a.hidden)continue;
    for(let j=i+1;j<N.length;j++){const b=N[j];if(b.hidden)continue;
      let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2),f=2700/d2,fx=f*dx/d,fy=f*dy/d;
      a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}}
  linkEls.forEach(({a,b})=>{const na=byId[a],nb=byId[b];if(na.hidden||nb.hidden)return;
    let dx=nb.x-na.x,dy=nb.y-na.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-96)*0.017,fx=f*dx/d,fy=f*dy/d;
    na.vx+=fx;na.vy+=fy;nb.vx-=fx;nb.vy-=fy;});
  N.forEach(n=>{if(n.hidden)return;n.vx+=(W/2-n.x)*0.0017;n.vy+=(H/2-n.y)*0.0017;});
  N.forEach(n=>{if(n.fixed||n.hidden)return;n.vx*=0.86;n.vy*=0.86;n.x+=n.vx*alpha*1.4;n.y+=n.vy*alpha*1.4;});
  alpha*=0.996;if(alpha<0.02)alpha=0.02;
  linkEls.forEach(({a,b,el})=>{const na=byId[a],nb=byId[b];el.setAttribute("x1",na.x);el.setAttribute("y1",na.y);el.setAttribute("x2",nb.x);el.setAttribute("y2",nb.y);});
  nodeEls.forEach(({n,grp})=>grp.setAttribute("transform",`translate(${n.x},${n.y})`));
  requestAnimationFrame(tick);
}
const tip=document.getElementById("tooltip");
function hover(id){
  if(!id){nodeEls.forEach(({n,grp,tx})=>{grp.style.opacity="1";tx.style.opacity=n.cat==="hazard"?".9":"0";});
    linkEls.forEach(({el})=>el.setAttribute("stroke-opacity",".26"));tip.style.opacity=0;return;}
  nodeEls.forEach(({n,grp,tx})=>{const on=(n.id===id||adj[id].has(n.id));grp.style.opacity=on?"1":"0.1";tx.style.opacity=on?".95":"0";});
  linkEls.forEach(({a,b,el})=>el.setAttribute("stroke-opacity",(a===id||b===id)?".85":".04"));
  tip.textContent=byId[id].label;tip.style.opacity=1;
}
svg.addEventListener("pointermove",e=>{if(tip.style.opacity==="1"){tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY+12)+"px";}});
function detailFor(id){const n=byId[id],s=SUB[n.sub];const conns=[...adj[id]].map(c=>byId[c].label).sort();
  const dt=document.getElementById("detail");dt.style.display="block";dt.textContent="";
  const tag=document.createElement("span");tag.className="tag";tag.style.background=n.color+"26";tag.style.color=n.color;
  tag.textContent=`${CATS.find(c=>c.key===n.cat).name} · ${s.name}`;
  const h=document.createElement("h3");h.textContent=n.label;
  const p=document.createElement("p");p.textContent=n.d;
  const conn=document.createElement("div");conn.className="conn";
  const b=document.createElement("b");b.textContent=conns.length;
  conn.appendChild(b);conn.appendChild(document.createTextNode(` link${conns.length!==1?"s":""}: ${conns.join(" · ")}`));
  dt.append(tag,h,p,conn);
  hover(id);
}
function vis(){N.forEach(n=>n.hidden=!!hidden[n.sub]);
  nodeEls.forEach(({n,grp})=>grp.style.display=n.hidden?"none":"");
  linkEls.forEach(({a,b,el})=>el.style.display=(byId[a].hidden||byId[b].hidden)?"none":"");alpha=Math.max(alpha,.4);}

let view={x:0,y:0,k:1};
function av(){root.setAttribute("transform",`translate(${view.x},${view.y}) scale(${view.k})`);}
function toW(cx,cy){const r=svg.getBoundingClientRect();return{x:(cx-r.left-view.x)/view.k,y:(cy-r.top-view.y)/view.k};}
let drag=null,pan=null,ps=null;
svg.addEventListener("pointerdown",e=>{if(e.target===svg||e.target===root){pan=true;ps={x:e.clientX,y:e.clientY,vx:view.x,vy:view.y};}});
window.addEventListener("pointermove",e=>{if(drag){const p=toW(e.clientX,e.clientY);drag.n.x=p.x;drag.n.y=p.y;alpha=Math.max(alpha,.3);}
  else if(pan){view.x=ps.vx+(e.clientX-ps.x);view.y=ps.vy+(e.clientY-ps.y);av();}});
window.addEventListener("pointerup",()=>{if(drag){drag.n.fixed=false;drag=null;}pan=null;});
svg.addEventListener("wheel",e=>{e.preventDefault();const r=svg.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,
