# =============================================================================
# GAIA Knowledge Graph — source of truth
# =============================================================================
# Edit THIS file, then run:  python book/graph/build_graph.py
# (a biweekly GitHub Action also regenerates the HTML from this file).
#
# Colour rule: hue = category, brightness = subcategory.
#   category keys : hazard | model | data
#   subcategory   : declared under each category's `subs:` as [key, name, lightness%]
#
# node : {id, cat, sub, label, d}
# edge : [from_id, to_id, type]   type = f(feeds) p(produces) u(uses) v(validates) d(detects)
# =============================================================================

categories:
  - key: hazard
    name: Hazards
    hue: 28
    sat: 82
    subs:
      - [landslide, Landslides, 60]
      - [earthquake, Earthquakes, 50]
      - [flood, Floods, 65]
      - [thunderstorm, Thunderstorms, 72]
  - key: model
    name: Models
    hue: 265
    sat: 52
    subs:
      - [prediction, Prediction, 67]
      - [detection, Detection, 47]
  - key: data
    name: Data
    hue: 202
    sat: 68
    subs:
      - [raw, Raw / static, 68]
      - [observed, Observed / dynamic, 55]
      - [derived, Derived / state, 43]

nodes:
  # ---- hazards ----
  - {id: landslide,    cat: hazard, sub: landslide,    label: Landslides,    d: "Rainfall- & groundwater-driven slope failures (shallow + deep-seated; post-fire debris flows are a special case)."}
  - {id: earthquake,   cat: hazard, sub: earthquake,   label: Earthquakes,   d: "Ground motion, wavefields, and triggered ground failure / liquefaction."}
  - {id: flood,        cat: hazard, sub: flood,         label: Floods,        d: "Runoff- and streamflow-driven inundation, incl. flash floods."}
  - {id: thunderstorm, cat: hazard, sub: thunderstorm, label: Thunderstorms, d: "Convective storms; precipitation trigger for floods & landslides."}
  # ---- models: prediction ----
  - {id: landlab,    cat: model, sub: prediction, label: "Landlab LandslideProbability", d: "Infinite-slope factor of safety + Monte Carlo → probability of failure."}
  - {id: ecohydro,   cat: model, sub: prediction, label: "Ecohydrology water balance",   d: "Root-zone soil-water balance: infiltration, ET, leakage, runoff."}
  - {id: gw,         cat: model, sub: prediction, label: "Groundwater (Dupuit)",          d: "Transient depth-integrated water table."}
  - {id: routing,    cat: model, sub: prediction, label: "Flow routing",                  d: "Drainage & contributing area on a closed watershed."}
  - {id: reanalysis, cat: model, sub: prediction, label: "Soil Reanalysis (Pillar 1)",    d: "Fused hydromechanical soil state: saturation, water table, strength."}
  - {id: liq,        cat: model, sub: prediction, label: "Liquefaction / ground-failure surrogate", d: "Geospatial ML for liquefaction & ground-failure potential."}
  - {id: wavefield,  cat: model, sub: prediction, label: "Earthquake wavefield model",    d: "DL reconstruction & forecasting of full wavefields / ground motion."}
  - {id: floodfcst,  cat: model, sub: prediction, label: "Flood forecasting",             d: "Streamflow + SWE + meteorology → inundation forecast."}
  - {id: weather,    cat: model, sub: prediction, label: "Weather & AR forecasting",      d: "ACE2 + atmospheric-river index; AI weather for precipitation."}
  - {id: e2s,        cat: model, sub: prediction, label: "Earth2Studio (forecast driver)", d: "AI weather models supplying forecast precipitation to land models."}
  # ---- models: detection ----
  - {id: quakexnet,  cat: model, sub: detection, label: "QuakeXNet + ENVELOC",         d: "DL seismic detector & locator for surface mass-movement events."}
  - {id: eqdetect,   cat: model, sub: detection, label: "Large-earthquake detection",  d: "DL detection of earthquakes & strong motion (SeisBench)."}
  - {id: stormdet,   cat: model, sub: detection, label: "Storm detector",              d: "Thunderstorm detection from seismic + weather data."}
  - {id: flashflood, cat: model, sub: detection, label: "Flash-flood detection",       d: "Rapid detection from gauges, radar, and geophysical signals."}
  # ---- data: raw / static ----
  - {id: dem,     cat: data, sub: raw, label: "DEM (3DEP / OpenTopo)",  d: "Terrain elevation; sets slope & contributing area."}
  - {id: solus,   cat: data, sub: raw, label: "SOLUS100 soil",          d: "100 m soil texture/depth/density priors."}
  - {id: polaris, cat: data, sub: raw, label: "POLARIS soil",           d: "30 m probabilistic soil priors."}
  - {id: nlcd,    cat: data, sub: raw, label: "NLCD land cover",        d: "Vegetation → plant functional type, root cohesion."}
  - {id: vs30,    cat: data, sub: raw, label: "Vs30 / site geology",    d: "Site amplification & liquefaction susceptibility priors."}
  - {id: geotech, cat: data, sub: raw, label: "Geotech / Vs profiles",  d: "Parametric shear-velocity & geotechnical indices."}
  # ---- data: observed / dynamic ----
  - {id: prism,     cat: data, sub: observed, label: "PRISM precip + temp",        d: "Observed daily forcing (hindcast / nowcast)."}
  - {id: smap,      cat: data, sub: observed, label: "SMAP soil moisture",         d: "9 km soil-moisture calibration target."}
  - {id: era5,      cat: data, sub: observed, label: "ERA5 reanalysis (SWE)",      d: "Snow-water-equivalent & meteorology."}
  - {id: synoptic,  cat: data, sub: observed, label: "Synoptic stations",          d: "In-situ meteorology."}
  - {id: gauges,    cat: data, sub: observed, label: "USGS stream gauges",         d: "Streamflow & stage observations."}
  - {id: seismic,   cat: data, sub: observed, label: "Seismic waveforms (PNSN/DAS)", d: "Continuous ground motion; source of dv/v, detections, ground motion."}
  - {id: sar,       cat: data, sub: observed, label: "Sentinel-1 InSAR / SAR",     d: "Change detection of failures & surface displacement."}
  - {id: lidar,     cat: data, sub: observed, label: "Repeat lidar",               d: "Pre/post DEM differencing of initiation & erosion."}
  - {id: inventory, cat: data, sub: observed, label: "Landslide inventories",      d: "USGS / WA DNR mapped failures."}
  - {id: radar,     cat: data, sub: observed, label: "NEXRAD radar",               d: "Precipitation & convective-storm structure."}
  - {id: lightning, cat: data, sub: observed, label: "Lightning (GLM)",            d: "Convective activity & storm electrification."}
  - {id: ari,       cat: data, sub: observed, label: "Atmospheric-river index",    d: "Landfalling AR tracking & moisture transport."}
  # ---- data: derived / state ----
  - {id: slope,     cat: data, sub: derived, label: "Slope & contributing area",   d: "Terrain derivatives from routing."}
  - {id: transmiss, cat: data, sub: derived, label: "Transmissivity",              d: "Ksat × soil thickness."}
  - {id: recharge,  cat: data, sub: derived, label: "Recharge",                    d: "Deep leakage forcing (local or routed)."}
  - {id: wetness,   cat: data, sub: derived, label: "Relative wetness",            d: "Saturated fraction entering the factor of safety."}
  - {id: snow,      cat: data, sub: derived, label: "Snow / SWE (modeled)",        d: "Rain–snow partition and melt."}
  - {id: sm,        cat: data, sub: derived, label: "Soil moisture (modeled)",     d: "Root-zone saturation state."}
  - {id: head,      cat: data, sub: derived, label: "Water table / head",          d: "Deep wetness closure; liquefaction antecedent state."}
  - {id: strength,  cat: data, sub: derived, label: "Effective stress / strength", d: "Cohesion & friction governing failure."}
  - {id: dvv,       cat: data, sub: derived, label: "dv/v → Vs state",             d: "Time-lapse seismic velocity → saturation & water table."}
  - {id: pf,        cat: data, sub: derived, label: "Probability of failure  Pf",  d: "Primary landslide susceptibility product (0–1)."}
  - {id: lpi,       cat: data, sub: derived, label: "Liquefaction potential index", d: "Ground-failure potential product."}
  - {id: shakemap,  cat: data, sub: derived, label: "Ground motion / ShakeMap",    d: "PGA/PGV field — earthquake product & liquefaction trigger."}
  - {id: detcat,    cat: data, sub: derived, label: "QuakeXNet detection catalog", d: "Detected surface events — monitoring + validation labels."}
  - {id: floodmap,  cat: data, sub: derived, label: "Flood inundation forecast",   d: "Predicted flood extent & depth."}
  - {id: stormnow,  cat: data, sub: derived, label: "Storm / convection nowcast",  d: "Detected & short-lead convective activity."}

